<!DOCTYPE html>

<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Bucket List</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ヘッダー -->

  <header id="app-header">
    <div class="header-title">BUCKET LIST</div>
    <div class="header-stats">
      <span id="stat-done">0</span>/<span id="stat-total">0</span>
    </div>
    <button class="icon-btn" id="btn-add" title="追加">＋</button>
  </header>

  <!-- タブナビ -->

  <nav id="tab-nav">
    <button class="tab active" data-tab="list">リスト</button>
    <button class="tab" data-tab="visit">訪問記録</button>
    <button class="tab" data-tab="trash">ゴミ箱</button>
  </nav>

  <!-- 検索・フィルター -->

  <div id="filter-bar">
    <input type="search" id="search-input" placeholder="🔍 検索...">
    <select id="category-filter"><option value="">すべて</option></select>
    <select id="status-filter">
      <option value="">すべて</option>
      <option value="todo">未達成</option>
      <option value="done">達成済</option>
    </select>
  </div>

  <!-- メインコンテンツ -->

  <main id="main-content">
    <section id="tab-list" class="tab-content active">
      <ul id="bucket-list"></ul>
    </section>
    <section id="tab-visit" class="tab-content">
      <ul id="visit-list"></ul>
    </section>
    <section id="tab-trash" class="tab-content">
      <ul id="trash-list"></ul>
    </section>
  </main>

  <!-- 追加・編集モーダル -->

  <div id="modal-overlay" class="hidden">
    <div id="modal">
      <h2 id="modal-title">アイテム追加</h2>
      <input type="text" id="modal-input-text" placeholder="タイトル" maxlength="100">
      <select id="modal-input-cat"></select>
      <div class="modal-row">
        <label>優先度
          <select id="modal-input-prio">
            <option>低</option><option selected>中</option><option>高</option>
          </select>
        </label>
        <label>緊急度
          <select id="modal-input-urg">
            <option>低</option><option selected>中</option><option>高</option>
          </select>
        </label>
      </div>
      <div class="modal-btns">
        <button id="modal-cancel">キャンセル</button>
        <button id="modal-save" class="primary">保存</button>
      </div>
    </div>
  </div>

  <!-- ローディング -->

  <div id="loading" class="hidden"><div class="spinner"></div></div>

  <!-- トースト通知 -->

  <div id="toast" class="hidden"></div>

  <script src="js/firebase.js"></script>

  <script src="js/app.js"></script>

</body>
</html>
